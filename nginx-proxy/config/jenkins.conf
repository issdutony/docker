server {
    # 監聽 443 port，並啟動 SSL 加密
    listen 443 ssl;
    
    # 綁定指定的網域名稱
    server_name jenkins.local;

    # 指向憑證路徑 (可沿用共用的自簽憑證或獨立放另一張)
    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # 安全的 TLS 協議防護設定
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        # 將要求轉發至名稱為 my-jenkins 的內網 Docker 容器埠口 8080 
        proxy_pass http://jenkins:8080;
        
        # 設定代理表頭
        # Jenkins 官方建議使用 $http_host 來維持完整的域名名稱與 port 值
        proxy_set_header Host $http_host;
        
        # 紀錄訪客的真實 IP，避免 Jenkins 以為全部連線都來自 Nginx proxy
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # 標明這是一個透過 HTTPS 穿著安全外衣的連線，能避免 Jenkins UI 出現 "反向代理設定異常" 的管理員提示警告
        proxy_set_header X-Forwarded-Proto $scheme;

        # 重要：稍微放大 Nginx 允許的上傳限制 (避免往後上傳太龐大建置成品時被 HTTP 413 Payload Too Large 阻擋)
        client_max_body_size 50m;
    }
}
